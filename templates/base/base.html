{% load static %}

<!DOCTYPE html>

<html lang="en" class="h-full">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <title>{% block title %}Strike 1v1 Platform{% endblock %}</title>

        <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@400,0..1" rel="stylesheet">
        <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

        <script src="{% static 'js/tailwind-config.js' %}"></script>

        <link rel="stylesheet" href="{% static 'css/main.css' %}">

        {% block extra_head %}{% endblock %}
    </head>

    <body class="bg-dot-grid font-tahoma text-white min-h-screen flex flex-col overflow-y-auto">

        {% include 'components/header.html' %}

        <main class="flex-grow flex items-center justify-center p-8 mt-10 mb-20">
            {% block content %}{% endblock %}
        </main>

        {% include 'components/footer.html' %}

    </body>
</html>

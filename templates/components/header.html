<header class="w-full bg-card-dark border-b-[4px] border-black z-50 shadow-2xl h-16 font-tahoma shadow-[0_10px_25px_rgba(0,0,0,0.5)]">
    <div class="w-full h-full px-6 flex items-center justify-between">
        <div class="flex items-center gap-10 h-full">
            <div class="flex items-center h-full">
                <a href="/" class="bg-brand-red border-2 border-white text-white font-black px-4 py-1.5 text-2xl shadow-[3px_3px_0px_#000] active:translate-y-[1px] active:shadow-[1px_1px_0px_#000] transition-all">
                    Strike 1v1
                </a>
            </div>
            <nav class="flex h-full">
                <a href="/" class="nav-link-center px-6 text-[15px] font-bold tracking-tight uppercase transition-all border-b-4 flex items-center justify-center {% if request.path == '/' %} border-brand-red bg-white/5 text-white {% else %} border-transparent text-footer-text hover:text-white hover:bg-white/5 {% endif %}">
                    {% if user.is_authenticated %}DASHBOARD{% else %}LANDING PAGE{% endif %}
                </a>
                <a href="/play" class="nav-link-center px-6 text-[15px] font-bold tracking-tight uppercase transition-all border-b-4 flex items-center justify-center {% if request.path == '/play' %} border-brand-red bg-white/5 text-white {% else %} border-transparent text-footer-text hover:text-white hover:bg-white/5 {% endif %}">
                    PLAY
                </a>
                <a href="/leaderboard" class="nav-link-center px-6 text-[15px] font-bold tracking-tight uppercase transition-all border-b-4 flex items-center justify-center {% if request.path == '/leaderboard' %} border-brand-red bg-white/5 text-white {% else %} border-transparent text-footer-text hover:text-white hover:bg-white/5 {% endif %}">
                    LEADERBOARD
                </a>
            </nav>
        </div>

        <div class="flex items-center h-full">
            <div class="flex items-center border-l border-white/10 pl-6 h-full">
                {% if user.is_authenticated %}
                    <div class="relative h-full flex items-center" id="profile-dropdown-container">
                        <button onclick="toggleDropdown()" class="flex items-center gap-3 hover:bg-white/5 px-4 h-full transition-all group outline-none">
                            <span class="text-white font-bold text-xs uppercase tracking-widest group-hover:text-brand-red transition-colors">
                                Player: {{ user.username }}
                            </span>
                            <div class="w-10 h-10 border-2 border-white/20 bg-black flex-shrink-0 overflow-hidden shadow-[2px_2px_0px_#000] group-hover:border-brand-red">
                                {% if user.profile.image %}
                                    <img src="{{ user.profile.image.url }}" alt="Avatar" class="w-full h-full object-cover">
                                {% else %}
                                    <div class="w-full h-full bg-[#333] flex items-center justify-center text-white/40 font-black text-[10px]">IMG</div>
                                {% endif %}
                            </div>
                        </button>

                        <div id="profile-menu" class="hidden absolute right-0 top-[64px] w-full min-w-[160px] bg-card-dark border-2 border-black shadow-[8px_8px_0px_rgba(0,0,0,0.5)] z-[100]">
                            <div class="h-5 bg-main-dark border-b border-black flex items-center px-2 justify-end gap-1">
                                <span class="w-2 h-2 bg-[#444] border border-black/50"></span>
                                <span class="w-2 h-2 bg-brand-red border border-black/50"></span>
                            </div>
                            <div class="flex flex-col p-1">
                                <button onclick="showWipModal()" class="w-full px-3 py-2.5 text-[11px] font-bold text-white hover:bg-brand-red transition-colors uppercase tracking-widest text-right border border-transparent hover:border-white/10 outline-none">
                                    My Profile
                                </button>

                                <div class="border-t border-black/40 my-1 mx-1"></div>

                                <form id="logout-form" action="{% url 'logout' %}" method="post" class="hidden">
                                    {% csrf_token %}
                                </form>
                                <button onclick="document.getElementById('logout-form').submit();" class="w-full px-3 py-2.5 text-[11px] font-bold text-xp-red hover:bg-white hover:text-black transition-colors uppercase tracking-widest text-right border border-transparent outline-none">
                                    Log Out
                                </button>
                            </div>
                        </div>
                    </div>
                {% else %}
                    <div class="flex items-center gap-4">
                        <a href="{% url 'login' %}" class="xp-btn xp-btn-blue px-6 py-2 text-xs font-black">Login</a>
                        <a href="{% url 'signup' %}" class="xp-btn xp-btn-red px-6 py-2 text-xs font-black">Register</a>
                    </div>
                {% endif %}
            </div>
        </div>
    </div>
</header>
